name: Build Flet APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet & Tools
        run: |
          pip install flet

      - name: Build APK File
        run: |
          flet build apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Barmill-Offer-App
          path: build/apk/*.apk

