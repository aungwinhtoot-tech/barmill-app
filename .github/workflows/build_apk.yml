name: Build Flet APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet & Tools
        run: |
          pip install flet

      - name: Find main.py and Build APK Safely
        run: |
          echo "=== သင့် Repository ထဲရှိ ဖိုင်များ စာရင်း ==="
          find . -maxdepth 3 -not -path '*/.*'
          echo "======================================="

          # စာလုံးအကြီးအသေးမရွေး main.py ကို အရင်ရှာမည်
          TARGET_FILE=$(find . -iname "main.py" | head -n 1)

          # ရှာမတွေ့ပါက data.py နှင့် convert.py မဟုတ်သော အခြား .py ဖိုင်ကို ရှာမည်
          if [ -z "$TARGET_FILE" ]; then
            TARGET_FILE=$(find . -name "*.py" ! -name "data.py" ! -name "convert.py" | head -n 1)
          fi

          if [ -z "$TARGET_FILE" ]; then
            echo "Error: Python (.py) ဖိုင်လုံးဝ ရှာမတွေ့ပါ။"
            echo "သင့် Repository ထဲမှာ main.py ဖိုင် တင်ထားခြင်း ရှိမရှိ သေချာပြန်စစ်ပေးပါ။"
            exit 1
          fi

          TARGET_DIR=$(dirname "$TARGET_FILE")
          FILE_NAME=$(basename "$TARGET_FILE")
          
          cd "$TARGET_DIR"
          # Flet Build ရန်အတွက် နာမည်ကို main.py ဟု ပြောင်းလဲပေးခြင်း
          if [ "$FILE_NAME" != "main.py" ]; then
            echo "တွေ့ရှိသောဖိုင် '$FILE_NAME' ကို Flet အတွက် 'main.py' ဟု အလိုအလျောက် နာမည်ပြောင်းပေးလိုက်သည်။"
            mv "$FILE_NAME" main.py
          fi

          echo "အောင်မြင်သည် - Build စတင်လုပ်ဆောင်ပါမည်။"
          echo "y" | flet build apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Barmill-Offer-App
          path: "**/build/apk/*.apk"
