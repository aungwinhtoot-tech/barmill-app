name: Build Flet APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Tools & Dependencies
        run: |
          pip install flet pandas openpyxl

      - name: Auto-Convert Excel to Static data.py
        run: |
          python -c "
          import pandas as pd
          import json
          import os

          excel_file = 'Barmill Offer.xlsx'
          if os.path.exists(excel_file):
              print('အောင်မြင်သည်: Excel ဖိုင်ကို တွေ့ရှိသဖြင့် ဒေတာပြောင်းလဲခြင်း စတင်ပါမည်။')
              df = pd.read_excel(excel_file)
              
              # ကော်လံခေါင်းစဉ်များရှိ \n (newline) များကို space ဖြင့် အစားထိုးပြီး သန့်စင်ခြင်း
              df.columns = [str(c).replace('\n', ' ').replace('\r', ' ').strip() for c in df.columns]
              
              items = []
              for _, row in df.iterrows():
                  item_data = {}
                  for col in df.columns:
                      val = row[col]
                      if pd.isna(val):
                          item_data[col] = ''
                      elif isinstance(val, float) and val.is_integer():
                          item_data[col] = str(int(val))
                      else:
                          item_data[col] = str(val).strip()
                  
                  if any(v != '' for v in item_data.values()):
                      items.append(item_data)
              
              with open('data.py', 'w', encoding='utf-8') as f:
                  f.write('# GitHub Actions မှ အလိုအလျောက် ထုတ်လုပ်ပေးထားသော ဒေတာဖိုင်\n')
                  f.write('offers = ' + json.dumps(items, indent=4, ensure_ascii=False) + '\n')
              print('အောင်မြင်သည်: data.py ကို ပစ္စည်းစုစုပေါင်း', len(items), 'ခုဖြင့် တည်ဆောက်ပြီးပါပြီ။')
          else:
              print('သတိပေးချက်: Barmill Offer.xlsx ကို ရှာမတွေ့ပါ။ ဗလာဒေတာဖြင့် ဆက်သွားပါမည်။')
              with open('data.py', 'w', encoding='utf-8') as f:
                  f.write('offers = []\n')
          "

      - name: Build APK File
        run: |
          echo "y" | flet build apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Barmill-Offer-App
          path: "**/build/apk/*.apk"
